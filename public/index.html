<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Copy IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .container { margin-top: 50px; max-width: 600px !important; }
        #output { background: white; padding: 20px; border-radius: 10px; white-space: pre-wrap; display: none; margin-top: 20px; border: 1px solid #ddd; }
        .loader { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <div class="card-content">
                <span class="card-title center"><b>Gerador de Copy para Afiliados</b></span>
                <div class="input-field">
                    <input type="text" id="url" placeholder="Cole o link do produto">
                </div>
                <div class="input-field">
                    <input type="text" id="cupom" placeholder="Cupom (opcional)">
                </div>
                <div class="input-field">
                    <select id="style">
                        <option value="WhatsApp">WhatsApp / Grupos</option>
                        <option value="Instagram">Instagram / Story</option>
                        <option value="Urgência">🔥 Urgência Total</option>
                        <option value="Engraçado">😂 Humor/Descontraído</option>
                    </select>
                </div>
                <button class="btn waves-effect blue darken-2 w-100" style="width: 100%;" id="btn">Gerar Copy</button>
                
                <div class="progress loader" id="loader"><div class="indeterminate"></div></div>

                <div id="output"></div>
                
                <div id="actions" style="display: none; margin-top: 15px;" class="center">
                    <button class="btn green" onclick="copyText()">Copiar Texto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => M.FormSelect.init(document.querySelectorAll('select')));

        const btn = document.getElementById('btn');
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');

        btn.onclick = async () => {
            const url = document.getElementById('url').value;
            const cupom = document.getElementById('cupom').value;
            const style = document.getElementById('style').value;

            if(!url) return alert("Cole um link!");

            btn.disabled = true;
            loader.style.display = 'block';
            output.style.display = 'none';

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url, cupom, style })
                });
                const data = await res.json();
                output.innerText = data.copy;
                output.style.display = 'block';
                document.getElementById('actions').style.display = 'block';
            } catch (e) {
                alert("Erro ao gerar copy.");
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        };

        function copyText() {
            navigator.clipboard.writeText(output.innerText);
            M.toast({html: 'Copiado!'});
        }
    </script>
</body>
</html>
